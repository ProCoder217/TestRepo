name: Build Darling

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest # Using Fedora as per your environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Crucial for Darling to get all its pieces

      - name: Install Build Dependencies
        # Ensures multilib support (glibc-devel.i686) is present for the 32-bit build
        run: |
          dnf update -y
          dnf install -y cmake clang make glibc-devel.i686 glibc-devel 
          # Note: Add any other specific dependencies Darling requires here

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake ..

      - name: Compile Project (Sequential Build)
        run: |
          cd build
          # Removed -j4 to prevent architecture race conditions during LibreSSL compilation
          make
